<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C++ Core Terminal</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap');

        :root {
            --bg: #07090f;
            --surface: #10141f;
            --surface-active: #171f33;
            --border: #1e263d;
            --border-active: #3b82f6;
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.12);
            --text-main: #f1f5f9;
            --text-muted: #64748b;
            --success: #22c55e;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'JetBrains Mono', monospace;
            padding: 16px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Top Bar */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }

        .sys-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
            color: var(--text-muted);
            letter-spacing: 0.5px;
        }

        .status-dot {
            width: 7px;
            height: 7px;
            background: var(--success);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--success);
        }

        .lang-switch {
            display: flex;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            overflow: hidden;
        }

        .lang-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 11px;
            font-weight: 700;
            padding: 6px 12px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'JetBrains Mono', monospace;
        }

        .lang-btn.active {
            background: var(--accent);
            color: #fff;
        }

        /* Terminal Console Feed */
        .terminal-feed {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px 14px;
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            min-height: 44px;
        }

        .terminal-feed::before {
            content: '>';
            color: var(--accent);
            margin-right: 10px;
            font-weight: bold;
        }

        #log-text {
            color: var(--text-main);
            word-break: break-all;
        }

        /* Sections */
        .section-group {
            margin-bottom: 20px;
        }

        .section-label {
            font-size: 10px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        /* Cards */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px 16px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .card:active {
            transform: scale(0.99);
        }

        .card-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .card-title {
            font-size: 13px;
            font-weight: 700;
            color: var(--text-main);
        }

        .card-desc {
            font-size: 11px;
            color: var(--text-muted);
        }

        /* Custom Radio */
        .radio-indicator {
            width: 18px;
            height: 18px;
            border: 2px solid var(--border);
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .card.selected {
            border-color: var(--accent-active);
            background: var(--accent-glow);
        }

        .card.selected .radio-indicator {
            border-color: var(--accent);
            background: var(--accent);
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.4);
        }

        .card.selected .radio-indicator::after {
            content: '';
            width: 6px;
            height: 6px;
            background: #fff;
            border-radius: 1px;
        }

        /* Action Button */
        .action-container {
            margin-top: auto;
            padding-top: 10px;
        }

        .execute-btn {
            width: 100%;
            padding: 15px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'JetBrains Mono', monospace;
            box-shadow: 0 4px 20px rgba(59, 130, 246, 0.3);
            transition: all 0.2s;
        }

        .execute-btn:active {
            transform: scale(0.99);
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="sys-status">
            <div class="status-dot"></div>
            <span id="sys-title">СИСТЕМА ГОТОВА</span>
        </div>
        <div class="lang-switch">
            <button class="lang-btn active" onclick="setLang('ru')">RU</button>
            <button class="lang-btn" onclick="setLang('en')">EN</button>
        </div>
    </div>

    <div class="terminal-feed">
        <span id="log-text">Инициализация среды разработки... Выберите параметры.</span>
    </div>

    <div class="section-group">
        <div class="section-label" id="lbl-goal">Цель протокола</div>
        <div class="options-grid" id="goal-options">
            <div class="card selected" data-value="repeat_base" 
                 data-log-ru="Загружены библиотеки указателей и работы с памятью." 
                 data-log-en="Loaded base pointer libraries and memory structures."
                 onclick="selectCard(this, 'goal-options')">
                <div class="card-info">
                    <span class="card-title" data-ru="База и указатели" data-en="Base & Pointers">База и указатели</span>
                    <span class="card-desc" data-ru="Синтаксис, память, ссылки" data-en="Syntax, memory, references">Синтаксис, память, ссылки</span>
                </div>
                <div class="radio-indicator"></div>
            </div>
            <div class="card" data-value="deep_dive" 
                 data-log-ru="Установлены стандарты оптимизации C++20/23." 
                 data-log-en="Switched to advanced optimization standards C++20/23."
                 onclick="selectCard(this, 'goal-options')">
                <div class="card-info">
                    <span class="card-title" data-ru="Хардкор и C++20" data-en="Hardcore & C++20">Хардкор и C++20</span>
                    <span class="card-desc" data-ru="Шаблоны, оптимизация, UB" data-en="Templates, optimization, UB">Шаблоны, оптимизация, UB</span>
                </div>
                <div class="radio-indicator"></div>
            </div>
        </div>
    </div>

    <div class="section-group">
        <div class="section-label" id="lbl-level">Уровень доступа</div>
        <div class="options-grid" id="level-options">
            <div class="card selected" data-value="beginner" 
                 data-log-ru="Режим новичка: включены подробные аналогии." 
                 data-log-en="Beginner mode: Enabled simple analogies."
                 onclick="selectCard(this, 'level-options')">
                <div class="card-info">
                    <span class="card-title" data-ru="Новичок" data-en="Beginner">Новичок</span>
                    <span class="card-desc" data-ru="Простые объяснения с нуля" data-en="Simple explanations from scratch">Простые объяснения с нуля</span>
                </div>
                <div class="radio-indicator"></div>
            </div>
            <div class="card" data-value="expert" 
                 data-log-ru="Режим профи: низкоуровневый разбор и регистры." 
                 data-log-en="Expert mode: Low-level breakdown and registers."
                 onclick="selectCard(this, 'level-options')">
                <div class="card-info">
                    <span class="card-title" data-ru="Профи" data-en="Expert">Профи</span>
                    <span class="card-desc" data-ru="Регистры, стеки, ассемблер" data-en="Registers, stacks, assembly">Регистры, стеки, ассемблер</span>
                </div>
                <div class="radio-indicator"></div>
            </div>
        </div>
    </div>

    <div class="action-container">
        <button class="execute-btn" id="btn-submit" onclick="submitData()">./execute_session.sh</button>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        let currentLang = 'ru';

        const i18n = {
            ru: { 
                sys: "СИСТЕМА ГОТОВА", 
                goal: "Цель протокола", 
                level: "Уровень доступа", 
                defaultLog: "Инициализация среды разработки... Выберите параметры." 
            },
            en: { 
                sys: "SYSTEM READY", 
                goal: "Target Protocol", 
                level: "Execution Level", 
                defaultLog: "Initializing runtime environment... Select parameters." 
            }
        };

        function setLang(lang) {
            currentLang = lang;
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');

            document.getElementById('sys-title').innerText = i18n[lang].sys;
            document.getElementById('lbl-goal').innerText = i18n[lang].goal;
            document.getElementById('lbl-level').innerText = i18n[lang].level;

            // Обновляем тексты карточек
            document.querySelectorAll('.card').forEach(card => {
                const t = card.querySelector('.card-title');
                const d = card.querySelector('.card-desc');
                t.innerText = t.getAttribute(`data-${lang}`);
                d.innerText = d.getAttribute(`data-${lang}`);
            });

            // Обновляем лог выбранной карточки на нужном языке
            const selectedCard = document.querySelector('.card.selected');
            if (selectedCard) {
                document.getElementById('log-text').innerText = selectedCard.getAttribute(`data-log-${lang}`);
            }
        }

        function selectCard(card, containerId) {
            const container = document.getElementById(containerId);
            container.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
            card.classList.add('selected');
            
            // Выводим лог выбранной карточки на текущем языке
            document.getElementById('log-text').innerText = card.getAttribute(`data-log-${currentLang}`);
        }

        function submitData() {
            const goal = document.querySelector('#goal-options .selected').dataset.value;
            const level = document.querySelector('#level-options .selected').dataset.value;

            const payload = { goal, level, lang: currentLang };
            tg.sendData(JSON.stringify(payload));
            tg.close();
        }
    </script>
</body>
</html>
