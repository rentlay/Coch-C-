<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C++ Mentor v1</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        :root {
            --bg-color: #121214;
            --card-bg: #1a1a1e;
            --card-border: #2c2c33;
            --accent: #3b82f6;
            --text-main: #ffffff;
            --text-muted: #8e8e93;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            padding: 24px 20px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Top Bar: Title & Lang Switcher */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
        }

        h2 {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.4px;
        }

        .lang-switch {
            display: flex;
            background: var(--card-border);
            border-radius: 8px;
            padding: 2px;
        }

        .lang-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 12px;
            font-weight: 600;
            padding: 6px 10px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .lang-btn.active {
            background: var(--text-main);
            color: var(--bg-color);
        }

        /* Sections */
        .group {
            margin-bottom: 24px;
        }

        .section-title {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* Cards */
        .option-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            padding: 16px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .option-card:active {
            transform: scale(0.98);
        }

        .option-info {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .option-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-main);
        }

        .option-desc {
            font-size: 13px;
            color: var(--text-muted);
        }

        /* Radio Checkmark */
        .checkmark {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 2px solid var(--card-border);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .option-card.selected {
            border-color: var(--accent);
            background: rgba(59, 130, 246, 0.05);
        }

        .option-card.selected .checkmark {
            border-color: var(--accent);
            background: var(--accent);
        }

        .option-card.selected .checkmark::after {
            content: '';
            width: 6px;
            height: 6px;
            background: #fff;
            border-radius: 50%;
        }

        /* Button */
        .btn-container {
            margin-top: auto;
            padding-top: 20px;
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: var(--text-main);
            color: var(--bg-color);
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .submit-btn:active {
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <h2 id="ui-title">Настройка</h2>
        <div class="lang-switch">
            <button class="lang-btn active" onclick="setLang('ru')">RU</button>
            <button class="lang-btn" onclick="setLang('en')">EN</button>
        </div>
    </div>

    <div class="group">
        <div class="section-title" id="lbl-goal">Цель обучения</div>
        <div class="options" id="goal-options">
            <div class="option-card selected" data-value="repeat_base">
                <div class="option-info">
                    <span class="option-title" data-ru="Повторение базы" data-en="Review Basics">Повторение базы</span>
                    <span class="option-desc" data-ru="Синтаксис, указатели, память" data-en="Syntax, pointers, memory">Синтаксис, указатели, память</span>
                </div>
                <div class="checkmark"></div>
            </div>
            <div class="option-card" data-value="deep_dive">
                <div class="option-info">
                    <span class="option-title" data-ru="Глубокое погружение" data-en="Deep Dive">Глубокое погружение</span>
                    <span class="option-desc" data-ru="Оптимизация, стандарты C++20" data-en="Optimization, C++20 standards">Оптимизация, стандарты C++20</span>
                </div>
                <div class="checkmark"></div>
            </div>
        </div>
    </div>

    <div class="group">
        <div class="section-title" id="lbl-level">Уровень знаний</div>
        <div class="options" id="level-options">
            <div class="option-card selected" data-value="beginner">
                <div class="option-info">
                    <span class="option-title" data-ru="Новичок" data-en="Beginner">Новичок</span>
                    <span class="option-desc" data-ru="Объяснения с нуля" data-en="Explanations from scratch">Объяснения с нуля</span>
                </div>
                <div class="checkmark"></div>
            </div>
            <div class="option-card" data-value="middle">
                <div class="option-info">
                    <span class="option-title" data-ru="Средний" data-en="Intermediate">Средний</span>
                    <span class="option-desc" data-ru="Знаю ООП, плаваю в деталях" data-en="Know OOP, struggling with details">Знаю ООП, плаваю в деталях</span>
                </div>
                <div class="checkmark"></div>
            </div>
            <div class="option-card" data-value="expert">
                <div class="option-info">
                    <span class="option-title" data-ru="Профи" data-en="Expert">Профи</span>
                    <span class="option-desc" data-ru="Низкоуровневые нюансы и UB" data-en="Low-level nuances and UB">Низкоуровневые нюансы и UB</span>
                </div>
                <div class="checkmark"></div>
            </div>
        </div>
    </div>

    <div class="btn-container">
        <button class="submit-btn" id="btn-submit" onclick="submitData()">Начать</button>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        let currentLang = 'ru';

        const translations = {
            ru: { title: "Настройка", goal: "Цель обучения", level: "Уровень знаний", submit: "Начать" },
            en: { title: "Settings", goal: "Learning Goal", level: "Knowledge Level", submit: "Start" }
        };

        function setLang(lang) {
            currentLang = lang;
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            document.getElementById('ui-title').innerText = translations[lang].title;
            document.getElementById('lbl-goal').innerText = translations[lang].goal;
            document.getElementById('lbl-level').innerText = translations[lang].level;
            document.getElementById('btn-submit').innerText = translations[lang].submit;

            document.querySelectorAll('.option-card').forEach(card => {
                const title = card.querySelector('.option-title');
                const desc = card.querySelector('.option-desc');
                title.innerText = title.getAttribute(`data-${lang}`);
                desc.innerText = desc.getAttribute(`data-${lang}`);
            });
        }

        function setupSelector(containerId) {
            const container = document.getElementById(containerId);
            container.querySelectorAll('.option-card').forEach(card => {
                card.addEventListener('click', () => {
                    container.querySelectorAll('.option-card').forEach(c => c.classList.remove('selected'));
                    card.classList.add('selected');
                });
            });
        }

        setupSelector('goal-options');
        setupSelector('level-options');

        function submitData() {
            const goal = document.querySelector('#goal-options .selected').dataset.value;
            const level = document.querySelector('#level-options .selected').dataset.value;

            const data = { goal, level, lang: currentLang };
            tg.sendData(JSON.stringify(data));
            tg.close();
        }
    </script>
</body>
</html>
