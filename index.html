<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C++ Core Terminal</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap');

        :root {
            --bg: #050508;
            --surface: #0e1117;
            --surface-hover: #161b22;
            --border: #21262d;
            --accent: #58a6ff;
            --accent-glow: rgba(88, 166, 255, 0.15);
            --text-main: #f0f6fc;
            --text-muted: #8b949e;
            --success: #3fb950;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'JetBrains Mono', monospace;
            padding: 16px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Top Bar */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 12px;
        }

        .sys-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
            color: var(--text-muted);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: var(--success);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--success);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }

        .lang-switch {
            display: flex;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            overflow: hidden;
        }

        .lang-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 10px;
            font-weight: 700;
            padding: 5px 10px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'JetBrains Mono', monospace;
        }

        .lang-btn.active {
            background: var(--accent);
            color: #000;
        }

        /* Terminal Console Feed (Immersive element) */
        .terminal-feed {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 12px;
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 20px;
            height: 48px;
            display: flex;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        .terminal-feed::before {
            content: '>';
            color: var(--accent);
            margin-right: 8px;
            font-weight: bold;
        }

        #log-text {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Sections */
        .section-group {
            margin-bottom: 20px;
        }

        .section-label {
            font-size: 10px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        /* Cards */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .card:hover {
            border-color: var(--text-muted);
        }

        .card-info {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .card-title {
            font-size: 13px;
            font-weight: 700;
            color: var(--text-main);
        }

        .card-desc {
            font-size: 11px;
            color: var(--text-muted);
        }

        /* Custom Radio Switch */
        .radio-indicator {
            width: 16px;
            height: 16px;
            border: 2px solid var(--border);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .card.selected {
            border-color: var(--accent);
            background: var(--accent-glow);
        }

        .card.selected .radio-indicator {
            border-color: var(--accent);
            background: var(--accent);
            box-shadow: 0 0 8px var(--accent);
        }

        .card.selected .radio-indicator::after {
            content: '';
            width: 6px;
            height: 6px;
            background: #000;
            border-radius: 1px;
        }

        /* Action Button */
        .action-container {
            margin-top: auto;
            padding-top: 10px;
        }

        .execute-btn {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            color: #050508;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'JetBrains Mono', monospace;
            box-shadow: 0 0 15px rgba(88, 166, 255, 0.2);
            transition: all 0.2s;
        }

        .execute-btn:active {
            transform: scale(0.98);
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="sys-status">
            <div class="status-dot"></div>
            <span id="sys-title">SYSTEM_READY</span>
        </div>
        <div class="lang-switch">
            <button class="lang-btn active" onclick="setLang('ru')">RU</button>
            <button class="lang-btn" onclick="setLang('en')">EN</button>
        </div>
    </div>

    <!-- Интерактивная строка логов, которая имитирует живую систему -->
    <div class="terminal-feed">
        <span id="log-text">Initializing runtime environment...</span>
    </div>

    <div class="section-group">
        <div class="section-label" id="lbl-goal">Target Protocol</div>
        <div class="options-grid" id="goal-options">
            <div class="card selected" data-value="repeat_base" onclick="selectCard(this, 'goal-options', 'Loaded base pointer libraries.')">
                <div class="card-info">
                    <span class="card-title" data-ru="База и указатели" data-en="Base & Pointers">База и указатели</span>
                    <span class="card-desc" data-ru="Синтаксис, память, ссылки" data-en="Syntax, memory, references">Синтаксис, память, ссылки</span>
                </div>
                <div class="radio-indicator"></div>
            </div>
            <div class="card" data-value="deep_dive" onclick="selectCard(this, 'goal-options', 'Switched to advanced optimization standards.')">
                <div class="card-info">
                    <span class="card-title" data-ru="Хардкор и C++20" data-en="Hardcore & C++20">Хардкор и C++20</span>
                    <span class="card-desc" data-ru="Шаблоны, оптимизация, UB" data-en="Templates, optimization, UB">Шаблоны, оптимизация, UB</span>
                </div>
                <div class="radio-indicator"></div>
            </div>
        </div>
    </div>

    <div class="section-group">
        <div class="section-label" id="lbl-level">Execution Level</div>
        <div class="options-grid" id="level-options">
            <div class="card selected" data-value="beginner" onclick="selectCard(this, 'level-options', 'User space mode: Enabled simple analogies.')">
                <div class="card-info">
                    <span class="card-title" data-ru="Новичок" data-en="Beginner">Новичок</span>
                    <span class="card-desc" data-ru="Простые объяснения с нуля" data-en="Simple explanations from scratch">Простые объяснения с нуля</span>
                </div>
                <div class="radio-indicator"></div>
            </div>
            <div class="card" data-value="expert" onclick="selectCard(this, 'level-options', 'Kernel dev mode: Assembly & stack tracking.')">
                <div class="card-info">
                    <span class="card-title" data-ru="Профи" data-en="Expert">Профи</span>
                    <span class="card-desc" data-ru="Регистры, стеки, ассемблер" data-en="Registers, stacks, assembly">Регистры, стеки, ассемблер</span>
                </div>
                <div class="radio-indicator"></div>
            </div>
        </div>
    </div>

    <div class="action-container">
        <button class="execute-btn" id="btn-submit" onclick="submitData()">./execute_session.sh</button>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        let currentLang = 'ru';

        const i18n = {
            ru: { sys: "СИСТЕМА ГОТОВА", goal: "Цель протокола", level: "Уровень доступа", btn: "./execute_session.sh" },
            en: { sys: "SYSTEM_READY", goal: "Target Protocol", level: "Execution Level", btn: "./execute_session.sh" }
        };

        function setLang(lang) {
            currentLang = lang;
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');

            document.getElementById('sys-title').innerText = i18n[lang].sys;
            document.getElementById('lbl-goal').innerText = i18n[lang].goal;
            document.getElementById('lbl-level').innerText = i18n[lang].level;
            document.getElementById('btn-submit').innerText = i18n[lang].btn;

            document.querySelectorAll('.card').forEach(card => {
                const t = card.querySelector('.card-title');
                const d = card.querySelector('.card-desc');
                t.innerText = t.getAttribute(`data-${lang}`);
                d.innerText = d.getAttribute(`data-${lang}`);
            });
        }

        function selectCard(card, containerId, logMessage) {
            const container = document.getElementById(containerId);
            container.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
            card.classList.add('selected');
            
            // Живой отклик в консольном логе при клике
            document.getElementById('log-text').innerText = logMessage;
        }

        function submitData() {
            const goal = document.querySelector('#goal-options .selected').dataset.value;
            const level = document.querySelector('#level-options .selected').dataset.value;

            const payload = { goal, level, lang: currentLang };
            tg.sendData(JSON.stringify(payload));
            tg.close();
        }
    </script>
</body>
</html>
