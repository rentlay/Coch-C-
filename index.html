<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C++ Terminal Config v8</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600&display=swap');

        :root {
            --bg: #090a0f;
            --surface: #12141c;
            --surface-hover: #191c27;
            --border: #212635;
            --border-active: #3b82f6;
            --accent: #3b82f6;
            --text-main: #f8fafc;
            --text-muted: #64748b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Header Layout */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 16px;
        }

        .title-block h2 {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.3px;
            margin-bottom: 8px; /* Жесткий отступ, исключающий наплыв */
        }

        .title-block .code-line {
            font-size: 12px;
            color: var(--accent);
            font-family: 'JetBrains Mono', monospace;
            font-weight: 500;
            display: block;
        }

        /* Lang Switcher */
        .lang-switch {
            display: flex;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 2px;
            height: fit-content;
        }

        .lang-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 11px;
            font-weight: 600;
            padding: 6px 10px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'JetBrains Mono', monospace;
        }

        .lang-btn.active {
            background: var(--text-main);
            color: var(--bg);
        }

        /* Sections */
        .group {
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            font-family: 'JetBrains Mono', monospace;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        /* Cards */
        .option-card {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 14px 16px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .option-card:active {
            transform: scale(0.99);
        }

        .option-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .option-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-main);
        }

        .option-desc {
            font-size: 12px;
            color: var(--text-muted);
        }

        /* Radio Checkbox */
        .checkbox {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            border: 2px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .option-card.selected {
            border-color: var(--accent);
            background: rgba(59, 130, 246, 0.05);
        }

        .option-card.selected .checkbox {
            border-color: var(--accent);
            background: var(--accent);
        }

        .option-card.selected .checkbox::after {
            content: '';
            width: 6px;
            height: 6px;
            background: #fff;
            border-radius: 50%;
        }

        /* Button */
        .btn-container {
            margin-top: auto;
            padding-top: 16px;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: var(--text-main);
            color: var(--bg);
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
            font-family: 'Inter', sans-serif;
        }

        .submit-btn:active {
            opacity: 0.85;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="title-block">
            <h2 id="ui-title">Конфигурация</h2>
            <span class="code-line">./init_session.sh --config</span>
        </div>
        <div class="lang-switch">
            <button class="lang-btn active" onclick="setLang('ru', event)">RU</button>
            <button class="lang-btn" onclick="setLang('en', event)">EN</button>
        </div>
    </div>

    <div class="group">
        <div class="section-title" id="lbl-goal">Цель сессии</div>
        <div class="options" id="goal-options">
            <div class="option-card selected" data-value="repeat_base">
                <div class="option-info">
                    <span class="option-title" data-ru="База и синтаксис" data-en="Basics & Syntax">База и синтаксис</span>
                    <span class="option-desc" data-ru="Указатели, ссылки, память" data-en="Pointers, references, memory">Указатели, ссылки, память</span>
                </div>
                <div class="checkbox"></div>
            </div>
            <div class="option-card" data-value="deep_dive">
                <div class="option-info">
                    <span class="option-title" data-ru="Хардкор и стандарты" data-en="Hardcore & Standards">Хардкор и стандарты</span>
                    <span class="option-desc" data-ru="Оптимизация, C++20/23" data-en="Optimization, C++20/23">Оптимизация, C++20/23</span>
                </div>
                <div class="checkbox"></div>
            </div>
        </div>
    </div>

    <div class="group">
        <div class="section-title" id="lbl-level">Твой уровень</div>
        <div class="options" id="level-options">
            <div class="option-card selected" data-value="beginner">
                <div class="option-info">
                    <span class="option-title" data-ru="Новичок" data-en="Beginner">Новичок</span>
                    <span class="option-desc" data-ru="Объяснения с нуля" data-en="Explanations from scratch">Объяснения с нуля</span>
                </div>
                <div class="checkbox"></div>
            </div>
            <div class="option-card" data-value="middle">
                <div class="option-info">
                    <span class="option-title" data-ru="Средний" data-en="Intermediate">Средний</span>
                    <span class="option-desc" data-ru="Знаю ООП, путаюсь в деталях" data-en="Know OOP, struggling with details">Знаю ООП, путаюсь в деталях</span>
                </div>
                <div class="checkbox"></div>
            </div>
            <div class="option-card" data-value="expert">
                <div class="option-info">
                    <span class="option-title" data-ru="Профи" data-en="Expert">Профи</span>
                    <span class="option-desc" data-ru="Низкий уровень и UB" data-en="Low-level and UB">Низкий уровень и UB</span>
                </div>
                <div class="checkbox"></div>
            </div>
        </div>
    </div>

    <div class="btn-container">
        <button class="submit-btn" id="btn-submit" onclick="submitData()">Применить</button>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        let currentLang = 'ru';

        const translations = {
            ru: { 
                title: "Конфигурация", 
                goal: "Цель сессии", 
                level: "Твой уровень", 
                submit: "Применить" 
            },
            en: { 
                title: "Configuration", 
                goal: "Session Goal", 
                level: "Your Level", 
                submit: "Apply" 
            }
        };

        function setLang(lang, event) {
            currentLang = lang;
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            document.getElementById('ui-title').innerText = translations[lang].title;
            document.getElementById('lbl-goal').innerText = translations[lang].goal;
            document.getElementById('lbl-level').innerText = translations[lang].level;
            document.getElementById('btn-submit').innerText = translations[lang].submit;

            document.querySelectorAll('.option-card').forEach(card => {
                const title = card.querySelector('.option-title');
                const desc = card.querySelector('.option-desc');
                title.innerText = title.getAttribute(`data-${lang}`);
                desc.innerText = desc.getAttribute(`data-${lang}`);
            });
        }

        function setupSelector(containerId) {
            const container = document.getElementById(containerId);
            container.querySelectorAll('.option-card').forEach(card => {
                card.addEventListener('click', () => {
                    container.querySelectorAll('.option-card').forEach(c => c.classList.remove('selected'));
                    card.classList.add('selected');
                });
            });
        }

        setupSelector('goal-options');
        setupSelector('level-options');

        function submitData() {
            const goal = document.querySelector('#goal-options .selected').dataset.value;
            const level = document.querySelector('#level-options .selected').dataset.value;

            const data = { goal, level, lang: currentLang };
            tg.sendData(JSON.stringify(data));
            tg.close();
        }
    </script>
</body>
</html>
