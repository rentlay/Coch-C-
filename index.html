<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C++ Mentor</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: #0f1115; color: #f3f4f6; padding: 20px; display: flex; flex-direction: column; min-height: 100vh; }
        h2 { font-size: 22px; margin-bottom: 20px; font-weight: 600; color: #ffffff; }
        .section-title { font-size: 14px; color: #9ca3af; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
        .group { margin-bottom: 24px; }
        .options { display: flex; flex-direction: column; gap: 10px; }
        
        .option-card {
            background: #1a1d24;
            border: 2px solid #262a35;
            padding: 16px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 16px;
            font-weight: 500;
        }
        .option-card:active { transform: scale(0.98); }
        .option-card.selected {
            border-color: #3b82f6;
            background: rgba(59, 130, 246, 0.1);
            color: #ffffff;
        }
        
        .btn-container { margin-top: auto; padding-top: 20px; }
        .submit-btn {
            width: 100%;
            padding: 16px;
            background: #3b82f6;
            border: none;
            color: white;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .submit-btn:active { background: #2563eb; }
    </style>
</head>
<body>

    <h2>Настройка обучения</h2>

    <div class="group">
        <div class="section-title">Цель</div>
        <div class="options" id="goal-options">
            <div class="option-card selected" data-value="repeat_base">🔄 Повторение базы</div>
            <div class="option-card" data-value="deep_dive">⚡ Глубокое изучение и детали</div>
        </div>
    </div>

    <div class="group">
        <div class="section-title">Твой уровень</div>
        <div class="options" id="level-options">
            <div class="option-card selected" data-value="beginner">🌱 Полный ноль</div>
            <div class="option-card" data-value="middle">⚖️ Средние знания</div>
            <div class="option-card" data-value="expert">🔥 Высокие (профи)</div>
        </div>
    </div>

    <div class="btn-container">
        <button class="submit-btn" onclick="submitData()">Начать тренировку</button>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        // Логика выбора карточек
        function setupSelector(containerId) {
            const container = document.getElementById(containerId);
            container.querySelectorAll('.option-card').forEach(card => {
                card.addEventListener('click', () => {
                    container.querySelectorAll('.option-card').forEach(c => c.classList.remove('selected'));
                    card.classList.add('selected');
                });
            });
        }

        setupSelector('goal-options');
        setupSelector('level-options');

        function submitData() {
            const goal = document.querySelector('#goal-options .selected').dataset.value;
            const level = document.querySelector('#level-options .selected').dataset.value;

            const data = { goal, level };
            tg.sendData(JSON.stringify(data));
            tg.close();
        }
    </script>
</body>
</html>
