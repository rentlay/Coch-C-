<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C++ Mentor</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        :root {
            --bg: #09090b;
            --surface: #18181b;
            --surface-hover: #27272a;
            --border: #27272a;
            --border-active: #3b82f6;
            --accent: #3b82f6;
            --text-main: #f4f4f5;
            --text-muted: #71717a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            padding: 24px 16px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 32px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 16px;
        }

        .header h2 {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .header p {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        /* Lang Switcher */
        .lang-switch {
            display: flex;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 3px;
        }

        .lang-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 12px;
            font-weight: 600;
            padding: 6px 12px;
            border-radius: 7px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .lang-btn.active {
            background: var(--accent);
            color: #ffffff;
        }

        /* Sections */
        .group {
            margin-bottom: 28px;
        }

        .section-title {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .options {
            display: grid;
            gap: 10px;
        }

        /* Cards */
        .option-card {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 16px 18px;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .option-card:hover {
            border-color: var(--surface-hover);
            background: #1c1c21;
        }

        .option-card:active {
            transform: scale(0.98);
        }

        .option-content {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .option-icon {
            font-size: 20px;
            width: 36px;
            height: 36px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--border);
        }

        .option-info {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .option-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-main);
        }

        .option-desc {
            font-size: 12px;
            color: var(--text-muted);
        }

        /* Custom Checkbox */
        .checkbox {
            width: 20px;
            height: 20px;
            border-radius: 6px;
            border: 2px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .option-card.selected {
            border-color: var(--border-active);
            background: rgba(59, 130, 246, 0.06);
        }

        .option-card.selected .checkbox {
            border-color: var(--accent);
            background: var(--accent);
        }

        .option-card.selected .checkbox::after {
            content: '✓';
            color: #fff;
            font-size: 11px;
            font-weight: bold;
        }

        .option-card.selected .option-icon {
            border-color: rgba(59, 130, 246, 0.3);
            background: rgba(59, 130, 246, 0.1);
        }

        /* Button */
        .btn-container {
            margin-top: auto;
            padding-top: 20px;
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: var(--accent);
            color: #ffffff;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            box-shadow: 0 4px 14px rgba(59, 130, 246, 0.3);
        }

        .submit-btn:active {
            transform: scale(0.99);
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <div class="header">
        <div>
            <h2 id="ui-title">Параметры</h2>
            <p>Выбери формат обучения</p>
        </div>
        <div class="lang-switch">
            <button class="lang-btn active" onclick="setLang('ru')">RU</button>
            <button class="lang-btn" onclick="setLang('en')">EN</button>
        </div>
    </div>

    <div class="group">
        <div class="section-title" id="lbl-goal">Цель сессии</div>
        <div class="options" id="goal-options">
            <div class="option-card selected" data-value="repeat_base">
                <div class="option-content">
                    <div class="option-icon">🔄</div>
                    <div class="option-info">
                        <span class="option-title" data-ru="База и синтаксис" data-en="Basics & Syntax">База и синтаксис</span>
                        <span class="option-desc" data-ru="Указатели, ссылки, память" data-en="Pointers, references, memory">Указатели, ссылки, память</span>
                    </div>
                </div>
                <div class="checkbox"></div>
            </div>
            <div class="option-card" data-value="deep_dive">
                <div class="option-content">
                    <div class="option-icon">⚡</div>
                    <div class="option-info">
                        <span class="option-title" data-ru="Хардкор и стандарты" data-en="Hardcore & Standards">Хардкор и стандарты</span>
                        <span class="option-desc" data-ru="Оптимизация, C++20/23" data-en="Optimization, C++20/23">Оптимизация, C++20/23</span>
                    </div>
                </div>
                <div class="checkbox"></div>
            </div>
        </div>
    </div>

    <div class="group">
        <div class="section-title" id="lbl-level">Твой уровень</div>
        <div class="options" id="level-options">
            <div class="option-card selected" data-value="beginner">
                <div class="option-content">
                    <div class="option-icon">🌱</div>
                    <div class="option-info">
                        <span class="option-title" data-ru="Новичок" data-en="Beginner">Новичок</span>
                        <span class="option-desc" data-ru="Объяснения с нуля" data-en="Explanations from scratch">Объяснения с нуля</span>
                    </div>
                </div>
                <div class="checkbox"></div>
            </div>
            <div class="option-card" data-value="middle">
                <div class="option-content">
                    <div class="option-icon">💻</div>
                    <div class="option-info">
                        <span class="option-title" data-ru="Средний" data-en="Intermediate">Средний</span>
                        <span class="option-desc" data-ru="Знаю ООП, путаюсь в деталях" data-en="Know OOP, struggling with details">Знаю ООП, путаюсь в деталях</span>
                    </div>
                </div>
                <div class="checkbox"></div>
            </div>
            <div class="option-card" data-value="expert">
                <div class="option-content">
                    <div class="option-icon">🔥</div>
                    <div class="option-info">
                        <span class="option-title" data-ru="Профи" data-en="Expert">Профи</span>
                        <span class="option-desc" data-ru="Низкий уровень и UB" data-en="Low-level and UB">Низкий уровень и UB</span>
                    </div>
                </div>
                <div class="checkbox"></div>
            </div>
        </div>
    </div>

    <div class="btn-container">
        <button class="submit-btn" id="btn-submit" onclick="submitData()">Применить настройки</button>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        let currentLang = 'ru';

        const translations = {
            ru: { 
                title: "Параметры", 
                subtitle: "Выбери формат обучения",
                goal: "Цель сессии", 
                level: "Твой уровень", 
                submit: "Применить настройки" 
            },
            en: { 
                title: "Parameters", 
                subtitle: "Choose learning format",
                goal: "Session Goal", 
                level: "Your Level", 
                submit: "Apply Settings" 
            }
        };

        function setLang(lang) {
            currentLang = lang;
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            document.getElementById('ui-title').innerText = translations[lang].title;
            document.getElementById('lbl-goal').innerText = translations[lang].goal;
            document.getElementById('lbl-level').innerText = translations[lang].level;
            document.getElementById('btn-submit').innerText = translations[lang].submit;

            document.querySelectorAll('.option-card').forEach(card => {
                const title = card.querySelector('.option-title');
                const desc = card.querySelector('.option-desc');
                title.innerText = title.getAttribute(`data-${lang}`);
                desc.innerText = desc.getAttribute(`data-${lang}`);
            });
        }

        function setupSelector(containerId) {
            const container = document.getElementById(containerId);
            container.querySelectorAll('.option-card').forEach(card => {
                card.addEventListener('click', () => {
                    container.querySelectorAll('.option-card').forEach(c => c.classList.remove('selected'));
                    card.classList.add('selected');
                });
            });
        }

        setupSelector('goal-options');
        setupSelector('level-options');

        function submitData() {
            const goal = document.querySelector('#goal-options .selected').dataset.value;
            const level = document.querySelector('#level-options .selected').dataset.value;

            const data = { goal, level, lang: currentLang };
            tg.sendData(JSON.stringify(data));
            tg.close();
        }
    </script>
</body>
</html>
