<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; padding: 20px; background: #121212; color: white; }
        select { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; }
        button { width: 100%; padding: 15px; background: #4a90e2; border: none; color: white; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h3>Настройка обучения</h3>
    <select id="goal">
        <option value="repeat_base">Повторить базу</option>
        <option value="deep_dive">Глубокое изучение</option>
    </select>
    <select id="level">
        <option value="beginner">Я новичок</option>
        <option value="expert">Я профи</option>
    </select>
    <button onclick="send()">Начать!</button>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        function send() {
            let data = {
                goal: document.getElementById('goal').value,
                level: document.getElementById('level').value
            };
            window.Telegram.WebApp.sendData(JSON.stringify(data));
        }
    </script>
</body>
</html>
